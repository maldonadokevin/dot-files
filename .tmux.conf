# Swap prefix from Ctrl-b to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix  # Ctrl-a Ctrl-a sends literal Ctrl-a to the shell

# Enable mouse (scrolling, clicking panes)
set -g mouse on

# Split panes, opening in the current directory
bind | split-window -h -c "#{pane_current_path}"  # Vertical split
bind - split-window -v -c "#{pane_current_path}"  # Horizontal split

# Navigate panes with prefix + hjkl (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# 256-color support
set -g default-terminal "screen-256color"

# Keep 10k lines of scrollback per pane
set -g history-limit 10000
